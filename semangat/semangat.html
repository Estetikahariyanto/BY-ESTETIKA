<!DOCTYPE html>
<html lang="id">
<head>
    <script src="script.js" defer></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SEMANGAT 🔥</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family:'Poppins',Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(-45deg,#ff9a00,#ff3c00,#ffd000,#ff6a00);
    background-size:400% 400%;
    animation:gradientMove 4s linear infinite;
}

@keyframes gradientMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* ===== HALAMAN PERTAMA ===== */
#landingPage{
    position:fixed;
    width:100%;
    height:100vh;
    background:linear-gradient(135deg,#b64e39,#ffa000);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.landing-box{
    background:#fff;
    padding:50px 30px;
    border-radius:40px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
    animation:popIn .6s ease-out;
}

.landing-box h1{
    margin-bottom:20px;
    font-size:30px;
}

#startBtn{
    color:#ff8f00;
    font-weight:bold;
    cursor:pointer;
    font-size:18px;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%{opacity:1}
    50%{opacity:.4}
    100%{opacity:1}
}

@keyframes popIn{
    from{transform:scale(.6);opacity:0}
    to{transform:scale(1);opacity:1}
}

/* ===== HALAMAN KEDUA ===== */
.container{
    text-align:center;
    z-index:2;
    padding:20px;
    max-width:480px;
}

h1{
    font-size:8vw;
    font-weight:900;
    color:#fff;
    letter-spacing:2px;
}

.wave span{
    display:inline-block;
    animation:waveText .6s ease-in-out infinite;
    text-shadow:
        0 1px 0 #ffd000,
        0 2px 0 #ffc400,
        0 3px 0 #ffb300,
        0 4px 0 #ffa000,
        0 5px 0 #ff8f00,
        0 6px 10px rgba(255,140,0,.8),
        0 0 25px rgba(255,200,0,.9),
        0 0 40px rgba(255,255,255,.9);
}

@keyframes waveText{
    0%{transform:translateY(0)}
    25%{transform:translateY(-15px) rotate(-6deg) scale(1.1)}
    50%{transform:translateY(0)}
    75%{transform:translateY(12px) rotate(6deg) scale(1.05)}
    100%{transform:translateY(0)}
}

.quote-box{
    background:#fff3e0;
    padding:20px;
    border-radius:20px;
    display:inline-block;
    transform:rotate(-2deg);
    box-shadow:0 15px 30px rgba(0,0,0,.25);
    animation:floatBox 2s ease-in-out infinite;
    margin-top:20px;
}

.quote-box p{
    font-size:4vw;
    color:#000;
    line-height:1.6;
}

@keyframes floatBox{
    0%{transform:rotate(-3deg) translateY(0)}
    50%{transform:rotate(3deg) translateY(-10px)}
    100%{transform:rotate(-3deg) translateY(0)}
}

canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:1;
}

@media(min-width:600px){
    h1{font-size:45px}
    .quote-box p{font-size:18px}
}
</style>
</head>

<body>

<!-- HALAMAN 1 -->
<div id="landingPage">
    <div class="landing-box">
        <h1>R</h1>
<p id="startBtn">Klik dulu yaa</p>
    </div>
</div>

<!-- HALAMAN 2 -->
<canvas id="fireCanvas"></canvas>

<div class="container">
    <h1 class="wave">
        <span>S</span>
        <span>E</span>
        <span>M</span>
        <span>A</span>
        <span>N</span>
        <span>G</span>
        <span>A</span>
        <span>T 🔥🎸</span>
    </h1>

    <div class="quote-box">
        <p>
            Jangan pernah menyerah dalam menghadapi tantangan.
            Setiap langkah kecil yang kamu ambil hari ini membawa kamu lebih dekat ke impianmu.
            Terus maju dan tetap semangat yaaa!
        </p>
    </div>
</div>

<!-- AUDIO -->
<audio id="bgMusic">
    <source src="petikbintang.mp3" type="audio/mpeg">
</audio>

<script>
// ===== MUSIC START SAAT KLIK =====
const landingPage = document.getElementById("landingPage");
const startBtn = document.getElementById("startBtn");
const music = document.getElementById("bgMusic");

startBtn.addEventListener("click", () => {
    music.currentTime = 0;
    music.volume = 1;
    music.play().catch(e => console.log(e));
    landingPage.style.display = "none";
});

// ===== FIRE PARTICLE =====
const canvas = document.getElementById("fireCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let particles=[];

function createParticle(x,y,explosion=false){
    return{
        x:x,
        y:y,
        size:Math.random()*8+3,
        speedX:explosion?(Math.random()-.5)*12:0,
        speedY:explosion?(Math.random()-.5)*12:-(Math.random()*3+1),
        life:100,
        color:`rgba(255,${Math.random()*150},0,1)`
    };
}

function createExplosion(){
    const centerX=canvas.width/2;
    const centerY=canvas.height/2;
    for(let i=0;i<150;i++){
        particles.push(createParticle(centerX,centerY,true));
    }
}

function updateParticles(){
    for(let i=0;i<6;i++){
        particles.push(createParticle(Math.random()*canvas.width,canvas.height));
    }
    particles.forEach((p,i)=>{
        p.x+=p.speedX;
        p.y+=p.speedY*1.5;
        p.size*=.96;
        p.life--;
        if(p.life<=0||p.size<.5)particles.splice(i,1);
    });
}

function drawParticles(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();
    });
}

function animate(){
    updateParticles();
    drawParticles();
    requestAnimationFrame(animate);
}

window.addEventListener("load",createExplosion);
animate();
</script>
<script src="script.js"></script>
</body>
</html>
